<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colour Picker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="container">
      <canvas id="canvas" width="1536" height="256"></canvas>

      <input id="slider" type="range" min="0" max="255" step="1" value="255" />

      <div id="brightness_output"></div>

      <div id="preview"></div>
      <div id="color_output">
        <p id="rgb"></p>
        <p id="hex" ></p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
